function colorFor(v) {
  if (v == null) return "#cccccc";
  for (let i = 0; i < BREAKS.length; i++) if (v < BREAKS[i]) return COLORS[i];
  return COLORS[COLORS.length - 1];
}
function fmt(v) { return v == null ? "n/a" : "$" + v.toLocaleString(); }

const map = L.map('map').setView([38.7, -80.5], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO | Income: U.S. Census ACS 2023 5-yr',
  maxZoom: 19
}).addTo(map);

// Build legend
const legend = document.getElementById('legend');
legend.innerHTML = "<b>Median household income</b>";
const labels = ["< $25k","$25–45k","$45–65k","$65–85k","$85–105k","$105–125k","≥ $125k"];
labels.forEach((lab, i) => {
  const row = document.createElement('div'); row.className = 'row';
  row.innerHTML = `<div class="sw" style="background:${COLORS[i]}"></div>${lab}`;
  legend.appendChild(row);
});

// Top-N list (top 20 statewide)
const sorted = Object.entries(INCOME).sort((a,b)=>b[1]-a[1]).slice(0,20);
const list = document.getElementById('topList');
list.innerHTML = "<li><b>Top 20 tracts statewide</b></li>" + sorted.map(([t,v]) =>
  `<li>${fmt(v)} — ${NEIGHBORHOOD[t] || ('Tract ' + t.split('-')[1] + ' (' + (COUNTY_NAMES[t.split('-')[0]] || t.split('-')[0]) + ')')}</li>`).join('');

// Fetch tract polygons live from the Census TIGERweb REST service.
// Layer 0 of Tracts_Blocks/MapServer is "Census Tracts" (current vintage).
const url = "https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/Tracts_Blocks/MapServer/0/query"
  + "?where=" + encodeURIComponent("STATE='54'")
  + "&outFields=GEOID,TRACT,COUNTY,NAME"
  + "&outSR=4326&resultRecordCount=2000&f=geojson";

fetch(url).then(r => r.json()).then(geo => {
  const keyFor = f => {
    const geoid = f.properties.GEOID || "";
    const county = f.properties.COUNTY || geoid.slice(2,5);
    const tract = f.properties.TRACT || geoid.slice(-6);
    return county + "-" + tract;
  };
  const layer = L.geoJSON(geo, {
    style: f => {
      const v = INCOME[keyFor(f)];
      return { color: "#333", weight: 0.7, fillColor: colorFor(v), fillOpacity: 0.78 };
    },
    onEachFeature: (f, lyr) => {
      const k = keyFor(f);
      const v = INCOME[k];
      const name = NEIGHBORHOOD[k] || "—";
      const countyName = COUNTY_NAMES[k.split("-")[0]] || "";
      lyr.bindTooltip(
        `<div class="info-box"><b>Tract ${k.split("-")[1]}</b> <span style="color:#666">(${countyName} Co.)</span><br>${name}<br>Median HH income: <b>${fmt(v)}</b></div>`,
        { sticky: true }
      );
      lyr.on('mouseover', () => lyr.setStyle({ weight: 2.2, color: "#000" }));
      lyr.on('mouseout',  () => lyr.setStyle({ weight: 0.7, color: "#333" }));
    }
  }).addTo(map);
  map.fitBounds(layer.getBounds(), { padding: [20, 20] });
}).catch(err => {
  document.getElementById('topList').innerHTML =
    "<li class='loading'>Could not load tract boundaries from Census TIGERweb. " +
    "Check internet connection. Error: " + err.message + "</li>";
});
</script>
</body>
</html>
